[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
  ".git",
  ".pytest_cache",
  ".playwright-cli",
  ".playwright-mcp",
  ".claude",
  "venv",
  "tmp",
  "output",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = [
  "E501",
  "B904",
  "B905",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
