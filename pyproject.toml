[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py311"
line-length = 120
extend-exclude = [
  ".git",
  ".pytest_cache",
  ".playwright-cli",
  ".playwright-mcp",
  ".claude",
  "auto-deploy.py",
  "scripts",
  "venv",
  "tmp",
  "output",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = [
  "E501",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
exclude = [
  "inference/engine.py",
  "inference/estimators.py",
  "inference/fx.py",
  "inference/llm_orchestrator.py",
  "inference/models.py",
  "inference/providers.py",
  "inference/task_manager.py",
  "report_automation/docx/self_proof.py",
  "report_automation/other_proof/core.py",
  "tests/test_chart_layout_integrity.py",
  "tests/test_engine.py",
  "tests/test_engine_llm.py",
  "tests/test_llm_orchestrator.py",
  "tests/test_other_proof.py",
  "tests/test_providers.py",
]
